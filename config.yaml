# CrossBench Configuration File
# =============================
# This is a template configuration file for CrossBench.
# Customize it according to your benchmarking needs.

# Global variables - applied to all benchmarks
# Single-element lists [value] are static (no iteration)
# Multi-element lists [val1, val2] are benchmark dimensions (iterate)
variables:
  --ctx-size: [4096, 8192]        # Benchmark these context sizes
  --n-predict: [128]              # Static: generate 128 output tokens
  --temp: [1.0]
  --min-p: [0.0]
  --top-k: [20]
  --top-p: [0.95]
  --repeat_penalty: [1.0]
  --presence_penalty: [1.5]
  --fit: [off]
  --gpu-layers: [all]
  --threads: [4]
  --no-kv-unified: [ ]
  --parallel: [1]
  --no-mmap: [ ]
  --tools: [all]

# Model groups - organize models into categories
# Each group specifies a path and optional variables
model_groups:
  moe_models:
    path: /home/simon/ggufs/crossbench/moe/           # Path to MoE model files
    variables:
      --n-cpu-moe: [32, 36, 40]     # Benchmark different CPU MoE layers

# Backend configurations
# Each backend specifies a command template and versions array
# Versions are benchmark dimensions - each version creates separate test runs
backends:
  llama.cpp:
    command_template: |
      llama-server --port 1234 -m /models/model.gguf {{ benchmark_params }}
    versions:
      - name: rocm
        image: ghcr.io/ggml-org/llama.cpp:server-rocm-b8637
        variables:
          --batch-size: [512]
          --flash-attn: [on]
      - name: vulkan
        image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b8637
        variables:
          --batch-size: [512]
          --flash-attn: [on]
